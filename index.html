<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvaron AI</title>

<style>
body{font-family:Arial;margin:0;background:#080b1f;color:white}
.hidden{display:none}
.screen{padding:20px}

/* simple UI */
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#7c3cff;color:white;cursor:pointer}
input{padding:10px;margin:5px;border-radius:8px;border:none;width:90%}

.chat-area{height:300px;overflow:auto;background:#111;padding:10px;border-radius:10px}
.msg{margin:5px;padding:10px;border-radius:10px}
.user{background:#7c3cff;text-align:right}
.ai{background:#222}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen">
<h1>Zyvaron AI</h1>
<button onclick="showIntro()">Start</button>
</div>

<!-- LOGIN -->
<div id="introLogin" class="screen hidden">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen hidden">

<h2 id="greeting">Hi</h2>

<div id="chatArea" class="chat-area"></div>

<input id="chatInput" placeholder="Ask something" onkeydown="enterSend(event)">
<button onclick="sendMessage()">Send</button>

<h3>Recent</h3>
<div id="recentChats"></div>

</div>

<script>

let currentUser = localStorage.getItem("user") || "User";
let recentChats = JSON.parse(localStorage.getItem("chats")) || [];

/* SCREEN */
function showIntro(){
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("introLogin").classList.remove("hidden");
}

/* LOGIN */
function login(){
  let name = document.getElementById("username").value.trim();
  if(!name){
    alert("Enter name");
    return;
  }

  currentUser = name;
  localStorage.setItem("user",name);

  document.getElementById("introLogin").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("greeting").innerText="Hi "+name;

  loadRecentChats();
}

/* CHAT */
async function sendMessage(){
  let input=document.getElementById("chatInput");
  let text=input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";
  saveRecent(text);

  let typing=document.createElement("div");
  typing.className="msg ai";
  typing.innerText="Thinking...";
  document.getElementById("chatArea").appendChild(typing);

  try{
    let res=await fetch("http://localhost:3000/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    let data=await res.json();
    typing.remove();
    addMessage(data.reply,"ai");

  }catch(e){
    typing.remove();
    addMessage("AI server error","ai");
  }
}

function enterSend(e){
  if(e.key==="Enter") sendMessage();
}

function addMessage(text,type){
  let div=document.createElement("div");
  div.className="msg "+(type==="user"?"user":"ai");
  div.innerText=text;
  let chat=document.getElementById("chatArea");
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* RECENT */
function saveRecent(text){
  recentChats.unshift(text);
  recentChats=recentChats.slice(0,5);
  localStorage.setItem("chats",JSON.stringify(recentChats));
  loadRecentChats();
}

function loadRecentChats(){
  let box=document.getElementById("recentChats");

  if(!box) return;

  box.innerHTML="";

  recentChats.forEach((c,i)=>{
    let d=document.createElement("div");
    d.innerHTML=c+" <button onclick='del("+i+")'>X</button>";
    box.appendChild(d);
  });

  if(recentChats.length>0){
    let b=document.createElement("button");
    b.innerText="Clear All";
    b.onclick=clearAll;
    box.appendChild(b);
  }
}

function del(i){
  recentChats.splice(i,1);
  localStorage.setItem("chats",JSON.stringify(recentChats));
  loadRecentChats();
}

function clearAll(){
  recentChats=[];
  localStorage.removeItem("chats");
  loadRecentChats();
}

</script>

</body>
</html>
