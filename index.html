<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvaron.AI</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:#050816;color:#fff;overflow:hidden}
body::before{
content:"";position:fixed;width:300%;height:300%;top:-100%;left:-100%;
background:
radial-gradient(circle at 20% 20%,#00e5ff55,transparent),
radial-gradient(circle at 80% 30%,#ff00cc55,transparent),
linear-gradient(135deg,#050816,#120926);
animation:bg 10s infinite alternate;z-index:-1}
@keyframes bg{to{transform:translate(50px,50px) scale(1.1);filter:hue-rotate(90deg)}}
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px}
.hidden{display:none!important}
.card{background:#ffffff10;padding:30px;border-radius:20px;text-align:center;width:320px;backdrop-filter:blur(18px);box-shadow:0 20px 60px #0008}
input{width:100%;padding:12px;margin:6px 0;border-radius:12px;border:0;background:#0006;color:white;outline:none}
button{padding:11px 14px;border-radius:12px;border:0;background:linear-gradient(135deg,#00c6ff,#7b2cff);color:white;margin:5px;cursor:pointer;font-weight:bold}
button:hover{transform:scale(1.04)}
.app{display:flex;width:100%;height:100%}
.sidebar{width:270px;background:#0004;padding:12px;display:flex;flex-direction:column;justify-content:space-between;backdrop-filter:blur(18px);position:relative}
.sidebar button{width:100%;text-align:left}
.main{flex:1;padding:12px;display:flex;flex-direction:column}
.chat{flex:1;background:#0004;overflow:auto;padding:12px;border-radius:15px}
.msg{margin:7px 0;line-height:1.5}
.userMsg{color:#00e5ff}
.botMsg{color:#7cff00}
.tools{display:none;flex-wrap:wrap;margin-top:8px}
.tools.show{display:flex}
.account{background:#0005;padding:10px;border-radius:12px;display:flex;gap:10px;align-items:center;cursor:pointer}
.avatar{width:42px;height:42px;border-radius:50%;background:#00e5ff;color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold}
.user-menu{display:none;position:absolute;bottom:82px;left:12px;right:12px;background:#050816;border:1px solid #ffffff22;border-radius:14px;padding:10px;box-shadow:0 15px 45px #0009;z-index:10}
.user-menu.show{display:block}
.user-menu button{width:100%;text-align:left;background:#ffffff12}
.recent{font-size:12px;max-height:180px;overflow:auto}
.recent-row{background:#0005;margin:4px 0;padding:6px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:5px}
.recent-row span{flex:1;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.delete-btn{background:#ff3b3b!important;padding:4px 7px!important;margin:0!important;width:auto!important}
.clear-btn{width:100%;background:#ff4444!important;margin-top:6px!important;text-align:center!important}
.input-row{display:flex;gap:8px;margin-top:8px}
.input-row input{flex:1}
@media(max-width:800px){
body{overflow:auto}
.app{flex-direction:column}
.sidebar{width:100%}
.screen{position:relative;min-height:100vh}
}
</style>
</head>

<body>

<div id="welcome" class="screen">
  <div class="card">
    <h1>Zyvaron AI</h1>
    <p>Smart AI Assistant</p>
    <button onclick="show('intro')">Start</button>
  </div>
</div>

<div id="intro" class="screen hidden">
  <div class="card">
    <h2>What Zyvaron Gives</h2>
    <p>Chat • Coding • Tools • Projects • Search • Dashboard</p>
    <button onclick="show('login')">Continue</button>
  </div>
</div>

<div id="login" class="screen hidden">
  <div class="card">
    <h2>Login</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="emailLogin()">Login</button><br>
    <button onclick="googleLogin()">Google</button>
    <button onclick="appleLogin()">Apple</button><br>
    <button onclick="forgotPassword()">Forgot</button>
    <button onclick="registerUser()">Register</button>
  </div>
</div>

<div id="app" class="screen hidden">
  <div class="app">

    <div class="sidebar">
      <div>
        <h3>⚡ Zyvaron</h3>
        <button onclick="newChat()">➕ New Chat</button>
        <button onclick="msg('History opened')">🕘 History</button>
        <button onclick="msg('Project area coming soon')">📂 Project</button>
        <button onclick="msg('Search chat coming soon')">🔍 Search Chat</button>
        <button onclick="toggleTools()">⋯ More Tools</button>

        <h4>Recent Chats</h4>
        <div id="recent" class="recent"></div>
      </div>

      <div class="account" onclick="toggleUserMenu()">
        <div class="avatar" id="av">U</div>
        <div>
          <b id="user">User</b><br>
          <small>Free Plan</small>
        </div>
      </div>

      <div id="userMenu" class="user-menu">
        <button onclick="msg('Profile feature coming soon')">👤 Profile</button>
        <button onclick="msg('AI menu: image, file, web, Excel and PPT tools coming soon')">🤖 AI Menu</button>
        <button onclick="msg('Upgrade premium plan coming soon')">💎 Upgrade Plan</button>
        <button onclick="msg('Settings coming soon')">⚙️ Settings</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </div>

    <div class="main">
      <h2 id="hi">Hi User</h2>

      <div id="chat" class="chat"></div>

      <div class="input-row">
        <button onclick="toggleTools()">⋯</button>
        <input id="input" placeholder="Ask Zyvaron...">
        <button onclick="send()">Send</button>
      </div>

      <div id="tools" class="tools">
        <button onclick="tool('Screenshot')">📸 Screenshot</button>
        <button onclick="tool('Attach File')">📎 Attach File</button>
        <button onclick="tool('Create Image')">🖼️ Create Image</button>
        <button onclick="tool('Recent Files')">📁 Recent Files</button>
        <button onclick="tool('Camera')">📷 Camera</button>
        <button onclick="tool('Deep Search')">🔎 Deep Search</button>
        <button onclick="tool('Excel')">📊 Excel</button>
        <button onclick="tool('PPT')">📽️ PPT</button>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSLcHRokXv81O4dr0RX30W3YIE6ujZxhw",
  authDomain: "zyvaron-ai.firebaseapp.com",
  projectId: "zyvaron-ai",
  storageBucket: "zyvaron-ai.firebasestorage.app",
  messagingSenderId: "997983383",
  appId: "1:997983383:web:46a0c5e8c59382e7fa55d2"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);
const provider = new GoogleAuthProvider();

let currentUserId = "guest";
let currentUserName = "User";

window.show = function(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
};

window.emailLogin = async function(){
  const emailVal = document.getElementById("email").value.trim();
  const passVal = document.getElementById("password").value.trim();

  if(!emailVal || !passVal){
    alert("Enter email and password");
    return;
  }

  try{
    const res = await signInWithEmailAndPassword(auth,emailVal,passVal);
    startApp(res.user);
  }catch(e){
    alert("Login failed. Create user in Firebase or click Register.");
  }
};

window.registerUser = async function(){
  const emailVal = document.getElementById("email").value.trim();
  const passVal = document.getElementById("password").value.trim();

  if(!emailVal || !passVal){
    alert("Enter email and password for register");
    return;
  }

  try{
    const res = await createUserWithEmailAndPassword(auth,emailVal,passVal);
    startApp(res.user);
  }catch(e){
    alert("Register failed. Password must be 6+ characters.");
  }
};

window.forgotPassword = async function(){
  const emailVal = document.getElementById("email").value.trim();

  if(!emailVal){
    alert("Enter your email first");
    return;
  }

  try{
    await sendPasswordResetEmail(auth,emailVal);
    alert("Password reset email sent");
  }catch(e){
    alert("Reset failed");
  }
};

window.googleLogin = async function(){
  try{
    const res = await signInWithPopup(auth,provider);
    startApp(res.user);
  }catch(e){
    alert("Google login failed. Add zyvaron.co.in and zyvaroncoin-ui.github.io in Firebase Authorized domains.");
  }
};

window.appleLogin = function(){
  alert("Apple login needs Apple Developer setup. This will be added later.");
};

async function startApp(userObj){
  currentUserId = userObj.uid || userObj.email || "guest";
  currentUserName = userObj.displayName || userObj.email || "User";

  document.getElementById("user").innerText = currentUserName;
  document.getElementById("hi").innerText = "Hi " + currentUserName;
  document.getElementById("av").innerText = currentUserName[0].toUpperCase();

  try{
    await setDoc(doc(db,"users",currentUserId),{
      name: currentUserName,
      email: userObj.email || "",
      plan: "Free",
      lastLogin: new Date().toISOString()
    },{merge:true});
  }catch(e){
    console.log("User save error",e);
  }

  show("app");
  newChat();
}

function addMessage(text,type){
  const chatBox = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + (type==="user" ? "userMsg" : "botMsg");
  div.textContent = (type==="user" ? "You: " : "Zyvaron: ") + text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

window.send = async function(){
  const inputBox = document.getElementById("input");
  const text = inputBox.value.trim();
  if(!text) return;

  addMessage(text,"user");
  saveRecent(text);
  inputBox.value = "";

  try{
    await addDoc(collection(db,"users",currentUserId,"chats"),{
      role:"user",
      text:text,
      time:new Date().toISOString()
    });
  }catch(e){
    console.log("Chat save error",e);
  }

  const typing = document.createElement("div");
  typing.className = "msg botMsg";
  typing.textContent = "Zyvaron: thinking...";
  document.getElementById("chat").appendChild(typing);

  setTimeout(async ()=>{
    typing.remove();
    const reply = demoAI(text);
    addMessage(reply,"bot");

    try{
      await addDoc(collection(db,"users",currentUserId,"chats"),{
        role:"bot",
        text:reply,
        time:new Date().toISOString()
      });
    }catch(e){
      console.log("Bot save error",e);
    }
  },600);
};

function demoAI(text){
  const t = text.toLowerCase();

  if(["porn","sex","xxx","18+","nude"].some(w=>t.includes(w))){
    return "Sorry, I cannot help with adult or unsafe content.";
  }
  if(t.includes("code") || t.includes("coding")){
    return "I can help with HTML, CSS, JavaScript, Python, Java, C, C++, React, Firebase and more. Real AI API will make this smarter.";
  }
  if(t.includes("website")){
    return "For Zyvaron.AI, first keep UI stable, then add Firebase data, then connect real AI with backend.";
  }
  if(t.includes("money") || t.includes("premium")){
    return "Best plan: Free users get limited features. Premium users get AI chat, file tools, image generation, Excel/PPT and faster service.";
  }
  return "Demo answer: " + text + ". Real ChatGPT-level answer needs backend AI API.";
}

window.tool = function(t){
  addMessage(t + " feature UI is ready. Real function will be connected later.","bot");
};

window.msg = function(t){
  addMessage(t,"bot");
};

window.newChat = function(){
  document.getElementById("chat").innerHTML = "";
  addMessage("New chat started. Ask Zyvaron anything.","bot");
};

window.toggleTools = function(){
  document.getElementById("tools").classList.toggle("show");
};

window.toggleUserMenu = function(){
  document.getElementById("userMenu").classList.toggle("show");
};

window.logout = async function(){
  try{ await signOut(auth); }catch(e){}
  currentUserId = "guest";
  currentUserName = "User";
  document.getElementById("chat").innerHTML = "";
  document.getElementById("userMenu").classList.remove("show");
  show("login");
};

function saveRecent(text){
  let arr = JSON.parse(localStorage.getItem("zyvaron_recent") || "[]");
  arr.unshift(text);
  arr = [...new Set(arr)].slice(0,8);
  localStorage.setItem("zyvaron_recent",JSON.stringify(arr));
  renderRecent();
}

function renderRecent(){
  let arr = JSON.parse(localStorage.getItem("zyvaron_recent") || "[]");

  const recentBox = document.getElementById("recent");

  if(arr.length === 0){
    recentBox.innerHTML = "<div>No recent chats</div>";
    return;
  }

  recentBox.innerHTML = arr.map((x,i)=>`
    <div class="recent-row">
      <span onclick="useRecent(${i})">${escapeHtml(x)}</span>
      <button class="delete-btn" onclick="deleteOneRecent(${i})">X</button>
    </div>
  `).join("");

  recentBox.innerHTML += `<button class="clear-btn" onclick="deleteAllRecent()">Clear All</button>`;
}

window.useRecent = function(index){
  let arr = JSON.parse(localStorage.getItem("zyvaron_recent") || "[]");
  document.getElementById("input").value = arr[index] || "";
};

window.deleteOneRecent = function(index){
  let arr = JSON.parse(localStorage.getItem("zyvaron_recent") || "[]");
  arr.splice(index,1);
  localStorage.setItem("zyvaron_recent",JSON.stringify(arr));
  renderRecent();
};

window.deleteAllRecent = function(){
  localStorage.removeItem("zyvaron_recent");
  renderRecent();
};

function escapeHtml(text){
  return text.replace(/[&<>"']/g,m=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter") window.send();
});

renderRecent();
</script>

</body>
</html>
