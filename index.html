<!-- 🔥 ZYVARON AI FINAL VERSION (UI + REAL AI + FEATURES) -->
<!-- Only important JS upgraded, UI same -->

<script>
let currentUser = localStorage.getItem("zyvaronUser") || "User";
let recentChats = JSON.parse(localStorage.getItem("zyvaronChats")) || [];

function showIntro(){
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("introLogin").classList.remove("hidden");
}

function login(){
  const name = document.getElementById("username").value.trim();
  if(!name){
    alert("Enter username");
    return;
  }
  startDashboard(name);
}

function demoLogin(name){
  startDashboard(name);
}

function registerUser(){
  const name = document.getElementById("username").value.trim() || "New User";
  startDashboard(name);
}

function forgotPassword(){
  alert("Demo mode");
}

function startDashboard(name){
  currentUser = name;
  localStorage.setItem("zyvaronUser", currentUser);

  document.getElementById("introLogin").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  updateUserUI();
  loadRecentChats();
}

function updateUserUI(){
  document.getElementById("greeting").innerText = "Hii " + currentUser;
  document.getElementById("profileName").innerText = currentUser;
  document.getElementById("avatarLetter").innerText = currentUser.charAt(0).toUpperCase();
}

async function sendMessage(){
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text, "user");
  saveRecent(text);
  input.value = "";

  // 🔥 typing animation
  const typing = document.createElement("div");
  typing.className = "msg ai-msg";
  typing.innerText = "Zyvaron is typing...";
  document.getElementById("chatArea").appendChild(typing);

  try{
    const res = await fetch("http://localhost:3000/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    const data = await res.json();
    typing.remove();
    addMessage(data.reply || "No reply", "ai");

  }catch(e){
    typing.remove();
    addMessage("AI server error ⚠️", "ai");
  }
}

function enterSend(e){
  if(e.key==="Enter") sendMessage();
}

function addMessage(text, sender){
  const chatArea = document.getElementById("chatArea");
  const msg = document.createElement("div");

  msg.className = "msg " + (sender==="user"?"user-msg":"ai-msg");
  msg.innerHTML = text;

  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

/* 🔥 RECENT CHAT SYSTEM */
function saveRecent(text){
  recentChats.unshift(text);
  recentChats = recentChats.slice(0,8);
  localStorage.setItem("zyvaronChats", JSON.stringify(recentChats));
  loadRecentChats();
}

function loadRecentChats(){
  const box = document.getElementById("recentChats");
  box.innerHTML = "";

  recentChats.forEach((chat,i)=>{
    const item = document.createElement("div");
    item.className="recent-item";

    item.innerHTML = `
      ${chat.substring(0,25)}...
      <button onclick="deleteChat(${i})">❌</button>
    `;
    box.appendChild(item);
  });

  if(recentChats.length>0){
    const clearBtn = document.createElement("button");
    clearBtn.innerText="Clear All";
    clearBtn.onclick=clearAll;
    box.appendChild(clearBtn);
  }
}

function deleteChat(i){
  recentChats.splice(i,1);
  localStorage.setItem("zyvaronChats", JSON.stringify(recentChats));
  loadRecentChats();
}

function clearAll(){
  recentChats=[];
  localStorage.removeItem("zyvaronChats");
  loadRecentChats();
}

/* 🔥 TOOLS */
function toggleTools(){
  document.getElementById("toolsMenu").classList.toggle("hidden");
}

function toolReply(text){
  toggleTools();
  addMessage(text, "ai");
}

/* 🔥 NEW CHAT */
function newChat(){
  document.getElementById("chatArea").innerHTML=
  `<div class="msg ai-msg">New chat started 🚀</div>`;
}

loadRecentChats();
</script>
