<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvaron.AI</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;background:#050816;color:#fff;overflow:hidden}

/* Background */
body::before{
content:"";
position:fixed;
width:300%;
height:300%;
top:-100%;
left:-100%;
background:
radial-gradient(circle at 20% 20%,#00e5ff55,transparent),
radial-gradient(circle at 80% 30%,#ff00cc55,transparent),
linear-gradient(135deg,#050816,#120926);
animation:bg 10s infinite alternate;
z-index:-1;
}
@keyframes bg{to{transform:translate(50px,50px) scale(1.1)}}

/* Layout */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.hidden{display:none}
.card{background:#ffffff10;padding:30px;border-radius:20px;text-align:center}
input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:0;background:#0005;color:white}
button{padding:10px;border-radius:10px;border:0;background:#00c6ff;color:white;margin:5px}

.app{display:flex;width:100%;height:100%}
.sidebar{width:250px;background:#0003;padding:10px}
.main{flex:1;padding:10px;display:flex;flex-direction:column}
.chat{flex:1;background:#0003;overflow:auto;padding:10px}

.msg{margin:5px 0}
.user{color:#00e5ff}
.bot{color:#7cff00}
</style>
</head>

<body>

<!-- Welcome -->
<div id="welcome" class="screen">
<div class="card">
<h1>Zyvaron AI</h1>
<button onclick="show('login')">Start</button>
</div>
</div>

<!-- Login -->
<div id="login" class="screen hidden">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="emailLogin()">Login</button><br>
<button onclick="googleLogin()">Google Login</button>
</div>
</div>

<!-- App -->
<div id="app" class="screen hidden">
<div class="app">

<div class="sidebar">
<button onclick="newChat()">New Chat</button>
</div>

<div class="main">
<h2 id="hi">Hi User</h2>

<div id="chat" class="chat"></div>

<input id="input" placeholder="Ask...">
<button onclick="send()">Send</button>

</div>

</div>
</div>

<script type="module">

// Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// Your Firebase config (already set)
const firebaseConfig = {
  apiKey: "AIzaSyBSLcHRokXv81O4dr0RX30W3YIE6ujZxhw",
  authDomain: "zyvaron-ai.firebaseapp.com",
  projectId: "zyvaron-ai",
  storageBucket: "zyvaron-ai.firebasestorage.app",
  messagingSenderId: "997983383",
  appId: "1:997983383:web:46a0c5e8c59382e7fa55d2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Screen switch
window.show = function(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'))
  document.getElementById(id).classList.remove('hidden')
}

// Email login
window.emailLogin = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try{
    const user = await signInWithEmailAndPassword(auth,email,pass);
    start(user.user.email);
  }catch{
    alert("Login failed");
  }
}

// Google login
window.googleLogin = async function(){
  try{
    const res = await signInWithPopup(auth,provider);
    start(res.user.displayName);
  }catch{
    alert("Google login failed");
  }
}

// Start app
function start(name){
  document.getElementById("hi").innerText="Hi "+name;
  show("app");
}

// Chat
window.send = function(){
  const inputBox = document.getElementById("input");
  const chatBox = document.getElementById("chat");

  let text = inputBox.value.trim();
  if(!text) return;

  chatBox.innerHTML += `<div class="msg user">You: ${text}</div>`;
  inputBox.value = "";

  setTimeout(()=>{
    chatBox.innerHTML += `<div class="msg bot">Zyvaron: ${text}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
  },500);
}

// New chat
window.newChat = function(){
  document.getElementById("chat").innerHTML = "New Chat Started";
}

// Enter key
document.getElementById("input").addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
