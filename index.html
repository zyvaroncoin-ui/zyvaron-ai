<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvaron.AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#050816;color:#fff;overflow:hidden}

/* 3D BG */
body::before{
content:"";position:fixed;width:300%;height:300%;top:-100%;left:-100%;
background:
radial-gradient(circle at 20% 20%,#00e5ff55,transparent),
radial-gradient(circle at 80% 30%,#ff00cc55,transparent),
linear-gradient(135deg,#050816,#120926);
animation:bg 10s infinite alternate;z-index:-1}
@keyframes bg{to{transform:translate(50px,50px) scale(1.1)}}

/* Screens */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.hidden{display:none}

/* Card */
.card{background:#ffffff10;padding:30px;border-radius:20px;text-align:center;width:320px}

/* Inputs */
input{width:100%;padding:12px;margin:6px 0;border-radius:12px;border:0;background:#0006;color:white}

/* Buttons */
button{padding:10px;border-radius:12px;border:0;background:linear-gradient(135deg,#00c6ff,#7b2cff);color:white;margin:5px;cursor:pointer}

/* Layout */
.app{display:flex;height:100%}
.sidebar{width:260px;background:#0004;padding:10px;display:flex;flex-direction:column;justify-content:space-between}
.main{flex:1;padding:10px;display:flex;flex-direction:column}

/* Chat */
.chat{flex:1;background:#0004;padding:10px;border-radius:15px;overflow:auto;display:flex;flex-direction:column}
.msg{max-width:75%;padding:10px;border-radius:15px;margin:5px 0;word-break:break-word}
.userMsg{align-self:flex-end;background:#007bff}
.botMsg{align-self:flex-start;background:#222}

/* Input */
.input-row{display:flex;gap:5px}
.input-row input{flex:1}

/* Sidebar */
.sidebar button{width:100%;text-align:left}

/* Tools */
#tools{display:none}
#tools button{width:100%;background:#333}

/* Account */
.account{display:flex;gap:10px;background:#0005;padding:10px;border-radius:10px;cursor:pointer}
.avatar{width:40px;height:40px;border-radius:50%;background:#00e5ff;color:#000;display:flex;align-items:center;justify-content:center}

/* Menu */
.menu{display:none;position:absolute;bottom:80px;left:10px;background:#000;padding:10px;border-radius:10px}
.menu.show{display:block}

/* Typing */
.typing::after{content:"";animation:dots 1s infinite}
@keyframes dots{0%{content:""}33%{content:"."}66%{content:".."}100%{content:"..."}}
</style>
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen">
<div class="card">
<h1>Zyvaron AI</h1>
<button onclick="show('intro')">Start</button>
</div>
</div>

<!-- INTRO -->
<div id="intro" class="screen hidden">
<div class="card">
<h2>AI Chat • Tools • Coding</h2>
<button onclick="show('login')">Continue</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="screen hidden">
<div class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="emailLogin()">Login</button>
<button onclick="googleLogin()">Google</button>
</div>
</div>

<!-- APP -->
<div id="app" class="screen hidden">
<div class="app">

<div class="sidebar">
<div>
<button onclick="newChat()">➕ New Chat</button>
<button onclick="msg('History coming soon')">🕘 History</button>
<button onclick="msg('Projects coming soon')">📂 Projects</button>
<button onclick="msg('Search coming soon')">🔍 Search</button>
<button onclick="toggleTools()">🧠 Tools</button>

<div id="recent"></div>
</div>

<div class="account" onclick="toggleMenu()">
<div class="avatar" id="av">U</div>
<div>
<b id="user">User</b><br>
<small id="plan">Free Plan</small>
<button onclick="upgrade()">Upgrade</button>
</div>
</div>

<div id="menu" class="menu">
<button onclick="logout()">Logout</button>
</div>

</div>

<div class="main">
<h2 id="hi">Hi</h2>

<div id="chat" class="chat"></div>

<div class="input-row">
<input id="input">
<button onclick="send()">Send</button>
</div>

<div id="tools">
<button onclick="msg('Screenshot')">Screenshot</button>
<button onclick="msg('File Upload')">File</button>
<button onclick="msg('Image AI')">Image</button>
<button onclick="msg('Camera')">Camera</button>
<button onclick="msg('Deep Search')">Search</button>
</div>

</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app=initializeApp({
apiKey:"AIzaSyBSLcHRokXv81O4dr0RX30W3YIE6ujZxhw",
authDomain:"zyvaron-ai.firebaseapp.com"
});

const auth=getAuth(app);
const provider=new GoogleAuthProvider();

let uid="guest";

window.show=id=>{
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")
}

window.emailLogin=async()=>{
try{
let u=await signInWithEmailAndPassword(auth,email.value,password.value)
start(u.user.email)
}catch{alert("Login failed")}
}

window.googleLogin=async()=>{
try{
let r=await signInWithPopup(auth,provider)
start(r.user.displayName)
}catch{alert("Google error")}
}

function start(name){
uid=name
user.innerText=name
hi.innerText="Hi "+name
av.innerText=name[0]
show("app")
}

function addMsg(t,type){
let d=document.createElement("div")
d.className="msg "+(type==="user"?"userMsg":"botMsg")
d.innerHTML=(type==="user"?"You: ":"Zyvaron: ")+t
chat.appendChild(d)
chat.scrollTop=chat.scrollHeight
}

window.send=async()=>{
let t=input.value.trim()
if(!t)return

let plan=localStorage.getItem("plan")||"Free"
let count=Number(localStorage.getItem("count")||0)

if(plan==="Free" && count>=5){
addMsg("Upgrade to Pro 🚀","bot")
return
}

localStorage.setItem("count",count+1)

addMsg(t,"user")
input.value=""

let typing=document.createElement("div")
typing.className="msg botMsg"
typing.innerHTML='Zyvaron: thinking<span class="typing"></span>'
chat.appendChild(typing)

setTimeout(()=>{
typing.remove()
// REAL AI CALL
const res = await fetch("http://localhost:3000/chat", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ message: t })
});

const data = await res.json();
addMsg(data.reply, "bot");
saveRecent(t)
},800)
}

window.newChat=()=>chat.innerHTML=""

window.toggleTools=()=>tools.style.display=tools.style.display==="block"?"none":"block"

window.toggleMenu=()=>menu.classList.toggle("show")

window.logout=()=>{signOut(auth);location.reload()}

window.upgrade=()=>{
localStorage.setItem("plan","Pro")
plan.innerText="Pro Plan"
alert("Pro Activated 🚀")
}

function saveRecent(t){
let arr=JSON.parse(localStorage.getItem("r")||"[]")
arr.unshift(t)
arr=arr.slice(0,5)
localStorage.setItem("r",JSON.stringify(arr))
renderRecent()
}

function renderRecent(){
let arr=JSON.parse(localStorage.getItem("r")||"[]")

recent.innerHTML=arr.map((x,i)=>`
<div>
<span onclick="input.value='${x}'">${x}</span>
<button onclick="del(${i})">X</button>
</div>`).join("")

if(arr.length>0){
recent.innerHTML+=`<button onclick="clearAll()">Clear All</button>`
}
}

window.del=i=>{
let arr=JSON.parse(localStorage.getItem("r")||"[]")
arr.splice(i,1)
localStorage.setItem("r",JSON.stringify(arr))
renderRecent()
}

window.clearAll=()=>{
localStorage.removeItem("r")
renderRecent()
}

renderRecent()
</script>

</body>
</html>
