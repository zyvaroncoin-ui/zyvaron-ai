<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvaron.AI</title>

<link rel="stylesheet" href="./style.css">

<style>
body::before {
  content: "";
  position: fixed;
  width: 300%;
  height: 300%;
  top: -100%;
  left: -100%;
  background: radial-gradient(circle, #dfffe9, transparent 70%);
  animation: moveBg 15s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(50px,50px); }
  100% { transform: translate(0,0); }
}

.tilt {
  transition: transform 0.2s ease;
  transform-style: preserve-3d;
}
</style>
</head>

<body>

<!-- Welcome -->
<section id="welcome-screen">
  <div class="welcome-card tilt">
    <h1>Welcome to Zyvaron AI</h1>
    <button id="start-btn">Start</button>
  </div>
</section>

<!-- Login -->
<section id="login-screen" class="hidden">
  <div class="login-box tilt">
    <h2>Login</h2>
    <form id="login-form">
      <input placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</section>

<!-- App -->
<section id="app-screen" class="hidden">
  <div class="app">

    <aside class="sidebar tilt">
      <button onclick="newChat()">New Chat</button>
    </aside>

    <main>
      <div id="chat-box"></div>

      <input id="user-input" placeholder="Ask..." />
      <button onclick="sendMessage()">Send</button>
    </main>

  </div>
</section>

<script src="./script.js"></script>

<script>
document.addEventListener("mousemove", (e) => {
  const x = (window.innerWidth / 2 - e.pageX) / 30;
  const y = (window.innerHeight / 2 - e.pageY) / 30;
  document.querySelectorAll(".tilt").forEach(el => {
    el.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
  });
});
</script>

</body>
</html>
