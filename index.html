<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyvaron.AI</title>

<style>
*{box-sizing:border-box;font-family:Inter,Arial}
body{margin:0;color:#fff;overflow:hidden;background:#050816}

/* ===== 3D BACKGROUND ===== */
.bg{
position:fixed;inset:0;z-index:-1;
background:
radial-gradient(circle at 20% 20%,#00e5ff55,transparent),
radial-gradient(circle at 80% 30%,#ff00cc55,transparent),
radial-gradient(circle at 50% 90%,#7cff0050,transparent),
linear-gradient(135deg,#050816,#120926);
animation:move 8s infinite alternate;
}
@keyframes move{to{filter:hue-rotate(90deg);transform:scale(1.1)}}

/* ===== SCREENS ===== */
.screen{
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
padding:20px;
}
.hidden{display:none}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
border-radius:25px;
padding:30px;
box-shadow:0 20px 60px #0008;
text-align:center;
}

/* ===== BUTTON ===== */
button{
border:0;padding:12px 18px;
border-radius:15px;
background:linear-gradient(135deg,#00c6ff,#7b2cff);
color:white;font-weight:700;cursor:pointer;
margin:5px;
}
button:hover{transform:scale(1.05)}

/* ===== INPUT ===== */
input{
width:100%;
padding:12px;
border-radius:15px;
border:0;
margin:8px 0;
background:rgba(0,0,0,.4);
color:white;
}

/* ===== APP ===== */
.app{display:flex;width:100%;height:100%}
.sidebar{
width:250px;
background:rgba(255,255,255,.1);
padding:15px;
display:flex;
flex-direction:column;
justify-content:space-between;
}
.menu button{width:100%;margin:5px 0}

.main{flex:1;padding:20px;display:flex;flex-direction:column}

/* CHAT */
.chat{
flex:1;
background:rgba(0,0,0,.3);
border-radius:15px;
padding:15px;
overflow:auto;
}

.msg{margin:8px 0}
.user{color:#00e5ff}
.bot{color:#7cff00}

/* TOOLS */
.tools{
display:none;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:8px;
margin-top:10px;
}
.tools.show{display:grid}

/* ACCOUNT */
.account{
background:rgba(0,0,0,.3);
padding:10px;
border-radius:15px;
display:flex;
align-items:center;
gap:10px;
}
.avatar{
width:40px;height:40px;border-radius:50%;
background:#00e5ff;display:flex;align-items:center;justify-content:center;
color:black;font-weight:bold;
}

</style>
</head>

<body>
<div class="bg"></div>

<!-- WELCOME -->
<div id="welcome" class="screen">
  <div class="card">
    <h1>Zyvaron.AI</h1>
    <p>Smart AI Assistant</p>
    <button onclick="show('intro')">Start</button>
  </div>
</div>

<!-- INTRO -->
<div id="intro" class="screen hidden">
  <div class="card">
    <h2>What Zyvaron gives</h2>
    <p>Chat • Code • Tools • AI UI • Projects • Search</p>
    <button onclick="show('login')">Continue</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login" class="screen hidden">
  <div class="card">
    <h2>Login</h2>
    <input id="name" placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button><br>
    <button onclick="alert('Google login later')">Google</button>
    <button onclick="alert('Apple login later')">Apple</button><br>
    <button onclick="alert('Forgot password later')">Forgot</button>
    <button onclick="alert('Register later')">Register</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="screen hidden">
  <div class="app">

    <div class="sidebar">
      <div>
        <h3>Zyvaron</h3>
        <div class="menu">
          <button onclick="newChat()">New Chat</button>
          <button onclick="msg('History')">History</button>
          <button onclick="msg('Project')">Project</button>
          <button onclick="msg('Search')">Search</button>
          <button onclick="toggleTools()">More</button>
        </div>
      </div>

      <div class="account">
        <div class="avatar" id="av">U</div>
        <div>
          <b id="user">User</b><br>
          <small>Free Plan</small>
        </div>
      </div>
    </div>

    <div class="main">
      <h2 id="hi">Hi User</h2>

      <div id="chat" class="chat"></div>

      <div>
        <input id="input" placeholder="Ask Zyvaron...">
        <button onclick="send()">Send</button>
        <button onclick="toggleTools()">⋯</button>
      </div>

      <div id="tools" class="tools">
        <button onclick="msg('Screenshot')">Screenshot</button>
        <button onclick="msg('File')">Attach File</button>
        <button onclick="msg('Image AI')">Create Image</button>
        <button onclick="msg('Camera')">Camera</button>
        <button onclick="msg('Search')">Search</button>
        <button onclick="msg('Deep Search')">Deep Search</button>
        <button onclick="msg('Excel')">Excel</button>
        <button onclick="msg('PPT')">PPT</button>
      </div>

    </div>
  </div>
</div>
  <script type="module">

// ===== FIREBASE IMPORT =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyBSLcHRokXv81O4dr0RX30W3YIE6ujZxhw",
  authDomain: "zyvaron-ai.firebaseapp.com",
  projectId: "zyvaron-ai",
  storageBucket: "zyvaron-ai.firebasestorage.app",
  messagingSenderId: "997983383",
  appId: "1:997983383:web:46a0c5e8c59382e7fa55d2"
};

// ===== INIT =====
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ===== SCREEN CONTROL =====
window.show = function(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ===== EMAIL LOGIN =====
window.login = async function(){
  const email = document.getElementById("name").value;
  const pass = document.querySelector("input[type='password']").value;

  if(!email || !pass){
    alert("Enter email & password");
    return;
  }

  try{
    const user = await signInWithEmailAndPassword(auth, email, pass);
    startApp(user.user.email);
  }catch(e){
    alert("Login failed");
  }
}

// ===== GOOGLE LOGIN =====
window.googleLogin = async function(){
  try{
    const result = await signInWithPopup(auth, provider);
    startApp(result.user.displayName);
  }catch(e){
    alert("Google login failed");
  }
}

// ===== START APP =====
function startApp(name){
  document.getElementById('user').innerText = name;
  document.getElementById('hi').innerText = "Hi " + name;
  document.getElementById('av').innerText = name[0].toUpperCase();
  show('app');
}

// ===== CHAT SYSTEM =====
window.send = function(){
  const text = input.value.trim();
  if(!text) return;

  chat.innerHTML += `<div class="msg user">You: ${text}</div>`;
  input.value = "";

  // typing effect
  const typing = document.createElement("div");
  typing.className = "msg bot";
  typing.innerText = "Zyvaron is thinking...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  setTimeout(()=>{
    typing.remove();

    chat.innerHTML += `<div class="msg bot">Zyvaron: ${text}</div>`;
    chat.scrollTop = chat.scrollHeight;
  },600);
}

// ===== UTIL =====
window.msg = function(t){
  chat.innerHTML += `<div class="msg bot">${t} tool coming soon</div>`;
}

window.newChat = function(){
  chat.innerHTML = "";
  chat.innerHTML = `<div class="msg bot">✨ New chat started</div>`;
}

window.toggleTools = function(){
  document.getElementById("tools").classList.toggle("show");
}

// ===== ENTER KEY =====
input.addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});

</body>
</html>
